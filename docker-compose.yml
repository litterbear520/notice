services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: sqlite:///./data/notice.db
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
